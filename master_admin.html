<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f0f2f5; --panel-bg: #ffffff; --primary: #0f172a; 
            --accent: #3b82f6; --text-main: #1e293b; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; }
        
        /* Login Screen */
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: white; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .login-box input { width: 100%; padding: 0.9rem; margin-bottom: 1rem; border-radius: 10px; border: 1px solid var(--border); box-sizing: border-box; }
        
        /* Main Panel */
        #main-panel { display: none; }
        .top-nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1440px; margin: 2rem auto; padding: 0 2rem; }
        
        /* Layout Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--panel-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .blue { background: #eff6ff; color: #3b82f6; } .green { background: #ecfdf5; color: #10b981; } .red { background: #fef2f2; color: #ef4444; } .orange { background: #fff7ed; color: #f59e0b; }
        
        .main-layout { display: grid; grid-template-columns: 2.8fr 1.2fr; gap: 1.5rem; }
        .card-panel { background: var(--panel-bg); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border); }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        
        .badge { padding: 6px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .badge-active { background: #dcfce7; color: #166534; } .badge-off { background: #f1f5f9; color: #475569; }
        
        .btn-action { border: none; background: #f1f5f9; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; transition: 0.2s; }
        .btn-action:hover { background: var(--accent); color: white; }
        .btn-del:hover { background: var(--danger); color: white; }

        /* Progress Bar */
        .bar-bg { background: #e2e8f0; height: 6px; border-radius: 3px; width: 80px; margin-top: 4px; }
        .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 400px; }
        
        .log-list { list-style: none; padding: 0; max-height: 250px; overflow-y: auto; font-size: 0.75rem; }
        .log-item { padding: 8px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🛡️</div>
        <h2>Portugal Vision</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Painel de Administração</p>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-pass" placeholder="Senha">
        <button onclick="handleLogin()" style="width:100%; padding:1rem; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:700; cursor:pointer;">Entrar</button>
        <p id="login-err" style="color:var(--danger); font-size:0.8rem; margin-top:10px; display:none;"></p>
    </div>
</div>

<div id="main-panel">
    <nav class="top-nav">
        <div style="font-weight: 800;">PORTUGAL VISION | MASTER</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="handleLogout()" style="background:none; color:white; border:1px solid rgba(255,255,255,0.2); padding:5px 15px; border-radius:8px; cursor:pointer;">Sair</button>
            <button onclick="carregarDados()" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:8px; cursor:pointer;"><i class="fas fa-sync"></i> Atualizar</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-store"></i></div><div><h3>Lojas</h3><p id="stat-total">0</p></div></div>
            <div class="stat-card"><div class="stat-icon green"><i class="fas fa-eye"></i></div><div><h3>Views</h3><p id="stat-views">0</p></div></div>
            <div class="stat-card"><div class="stat-icon red"><i class="fab fa-whatsapp"></i></div><div><h3>Waps</h3><p id="stat-waps">0</p></div></div>
            <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-hdd"></i></div><div><h3>Storage</h3><p id="stat-storage">0 MB</p></div></div>
        </div>

        <div class="main-layout">
            <div class="card-panel">
                <input type="text" id="search" placeholder="Filtrar por nome ou slug..." onkeyup="filtrarLojas()" style="width:100%; padding:12px; margin-bottom:1.5rem; border-radius:10px; border:1px solid var(--border); box-sizing:border-box;">
                <table>
                    <thead><tr><th>Loja / Slug</th><th>Módulos</th><th>Estado</th><th>Storage</th><th>Views</th><th style="text-align:right">Ações</th></tr></thead>
                    <tbody id="lista-lojas"></tbody>
                </table>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="card-panel">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem;"><i class="fas fa-chart-line"></i> Crescimento</h3>
                    <div style="height: 180px;"><canvas id="growthChart"></canvas></div>
                </div>
                <div class="card-panel">
                    <h3 style="font-size: 0.9rem; margin-bottom: 1rem;"><i class="fas fa-history"></i> Logs de Sistema</h3>
                    <ul id="log-container" class="log-list"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3>Editar Loja</h3>
        <input type="hidden" id="edit-id">
        <div style="margin-bottom:1rem;"><label>Nome</label><input type="text" id="edit-nome" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:5px;"></div>
        <div style="margin-bottom:1rem;"><label>Slug</label><input type="text" id="edit-slug" style="width:100%; padding:8px; border:1px solid var(--border); border-radius:5px;"></div>
        <button onclick="salvarEdicao()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">Salvar</button>
        <button onclick="fecharModal()" style="width:100%; margin-top:10px; background:none; border:none; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script>
    const SB_URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk";
    const _sb = supabase.createClient(SB_URL, SB_KEY);

    let todasAsLojas = [];
    let myChart = null;

    async function checkSession() {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) { exibirPainel(); }
    }

    async function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
        if (error) { 
            document.getElementById('login-err').innerText = error.message;
            document.getElementById('login-err').style.display = 'block';
        } else { exibirPainel(); }
    }

    function exibirPainel() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        carregarDados();
    }

    async function handleLogout() { await _sb.auth.signOut(); window.location.reload(); }

    async function carregarDados() {
        const { data, error } = await _sb.from('lojas').select('*').order('created_at', {ascending: false});
        if (error) { alert(error.message); return; }
        todasAsLojas = data;
        renderizar(data);
        atualizarStats(data);
        gerarGrafico(data);
    }

    function renderizar(lista) {
        document.getElementById('lista-lojas').innerHTML = lista.map(l => {
            const sizeMB = ((l.tamanho_kb || 0) / 1024).toFixed(2);
            const perc = Math.min((sizeMB / 500) * 100, 100);
            return `
            <tr>
                <td><b>${l.nome}</b><div style="font-size:0.7rem; color:var(--text-muted)">@${l.slug}</div></td>
                <td>
                    <button class="badge ${l.status_catalogo ? 'badge-active' : 'badge-off'}" onclick="toggle(${l.id},'status_catalogo',${l.status_catalogo})">Catálogo</button>
                    <button class="badge ${l.status_digital_box ? 'badge-active' : 'badge-off'}" onclick="toggle(${l.id},'status_digital_box',${l.status_digital_box})">Box</button>
                </td>
                <td>
                    <select onchange="updateStatus(${l.id}, this.value)" style="font-size:0.8rem; border-radius:4px; border:1px solid var(--border)">
                        <option value="ativa" ${l.status==='ativa'?'selected':''}>Ativa</option>
                        <option value="suspensa" ${l.status==='suspensa'?'selected':''}>Suspensa</option>
                    </select>
                </td>
                <td><div style="font-size:0.6rem">${sizeMB}MB</div><div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div></td>
                <td><i class="fas fa-eye" style="color:var(--accent)"></i> ${l.views || 0}</td>
                <td style="text-align:right">
                    <button class="btn-action" onclick='abrirModal(${JSON.stringify(l)})'><i class="fas fa-edit"></i></button>
                    <button class="btn-action btn-del" onclick="apagarLoja(${l.id}, '${l.nome}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
    }

    async function toggle(id, campo, valor) {
        await _sb.from('lojas').update({ [campo]: !valor }).eq('id', id);
        registrarLog(`Módulo ${campo} atualizado.`);
        carregarDados();
    }

    async function updateStatus(id, status) {
        await _sb.from('lojas').update({ status }).eq('id', id);
        registrarLog(`Status alterado para ${status}.`);
        carregarDados();
    }

    async function apagarLoja(id, nome) {
        if(confirm(`Eliminar ${nome}?`)) {
            await _sb.from('lojas').delete().eq('id', id);
            registrarLog(`Loja ${nome} eliminada.`);
            carregarDados();
        }
    }

    function registrarLog(msg) {
        const time = new Date().toLocaleTimeString('pt-PT', {hour:'2-digit', minute:'2-digit'});
        const li = `<li class="log-item"><b style="color:var(--text-muted)">${time}</b> <span>${msg}</span></li>`;
        document.getElementById('log-container').insertAdjacentHTML('afterbegin', li);
    }

    function abrirModal(l) {
        document.getElementById('edit-id').value = l.id;
        document.getElementById('edit-nome').value = l.nome;
        document.getElementById('edit-slug').value = l.slug;
        document.getElementById('modal').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modal').style.display = 'none'; }

    async function salvarEdicao() {
        const id = document.getElementById('edit-id').value;
        const up = { nome: document.getElementById('edit-nome').value, slug: document.getElementById('edit-slug').value };
        await _sb.from('lojas').update(up).eq('id', id);
        fecharModal();
        carregarDados();
    }

    function atualizarStats(lista) {
        document.getElementById('stat-total').innerText = lista.length;
        document.getElementById('stat-views').innerText = lista.reduce((a, b) => a + (b.views || 0), 0);
        document.getElementById('stat-waps').innerText = lista.reduce((a, b) => a + (b.waps || 0), 0);
        const totalKB = lista.reduce((a, b) => a + (b.tamanho_kb || 0), 0);
        document.getElementById('stat-storage').innerText = (totalKB / 1024).toFixed(1) + " MB";
    }

    function gerarGrafico(lista) {
        const ctx = document.getElementById('growthChart').getContext('2d');
        const counts = {};
        [...lista].reverse().forEach(l => {
            const d = new Date(l.created_at).toLocaleDateString('pt-PT', {month:'short', day:'numeric'});
            counts[d] = (counts[d] || 0) + 1;
        });
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), borderColor: '#3b82f6', tension: 0.3, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)' }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
    }

    function filtrarLojas() {
        const term = document.getElementById('search').value.toLowerCase();
        renderizar(todasAsLojas.filter(l => l.nome.toLowerCase().includes(term) || l.slug.toLowerCase().includes(term)));
    }

    checkSession();
</script>
</body>
</html>
