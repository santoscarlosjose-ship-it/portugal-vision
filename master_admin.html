<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f1f5f9; --primary: #0f172a; --accent: #2563eb; 
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0; 
            --success: #22c55e; --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        #login-screen { position: fixed; inset: 0; background: var(--primary); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: white; padding: 2.5rem; border-radius: 20px; width: 350px; text-align: center; }
        
        #main-panel { display: none; }
        .top-nav { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 1.2rem; border-radius: 16px; border: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; }
        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        .card-panel { background: white; padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--bg); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--bg); font-size: 0.85rem; }
        
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-on { background: #dcfce7; color: #15803d; }
        .btn-off { background: #fee2e2; color: #b91c1c; }
        .btn-susp { background: #fef3c7; color: #92400e; }
        
        .action-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: #f8fafc; cursor: pointer; color: var(--text); display: inline-flex; align-items: center; justify-content: center; }
        .action-btn:hover { background: var(--accent); color: white; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 2rem; border-radius: 20px; width: 400px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0 16px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--primary)">Portugal Vision</h2>
        <input type="email" id="log-email" placeholder="Email">
        <input type="password" id="log-pass" placeholder="Senha">
        <button onclick="handleLogin()" class="badge btn-on" style="width:100%; padding:14px; margin-top:10px;">ENTRAR</button>
    </div>
</div>

<div id="main-panel">
    <nav class="top-nav">
        <div style="display:flex; align-items:center; gap:15px;">
            <strong id="nav-title">PORTUGAL VISION MASTER CONTROL</strong>
            <button onclick="carregar()" class="action-btn" title="Atualizar Dados" style="background:rgba(255,255,255,0.2); color:white;">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        <button onclick="logout()" class="badge btn-off">SAIR</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon-box" style="background:#eff6ff; color:#3b82f6;"><i class="fas fa-store"></i></div>
                <div><small>Total Lojas</small><h3 id="st-lojas" style="margin:0">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="icon-box" style="background:#ecfdf5; color:#10b981;"><i class="fas fa-eye"></i></div>
                <div><small>Total Views</small><h3 id="st-views" style="margin:0">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="icon-box" style="background:#fff7ed; color:#f59e0b;"><i class="fab fa-whatsapp"></i></div>
                <div><small>Total WhatsApp</small><h3 id="st-wpp" style="margin:0">0</h3></div>
            </div>
        </div>

        <div class="card-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <input type="text" id="search" placeholder="Procurar loja..." onkeyup="filtrar()" style="max-width:250px; margin:0">
                <button onclick="abrirModal()" class="badge btn-on" style="height: fit-content;">+ NOVA LOJA</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Loja / Slug</th>
                        <th>Módulos Ativos</th>
                        <th>Views / Wpp</th>
                        <th>Estado</th>
                        <th style="text-align:right">Gestão</th>
                    </tr>
                </thead>
                <tbody id="lista-lojas"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalLoja" class="modal">
    <div class="modal-content">
        <h3 id="modal-title">Configurar Loja</h3>
        <input type="hidden" id="edit-id">
        <label>Nome Comercial</label><input type="text" id="field-nome">
        <label>Slug (URL personalizada)</label><input type="text" id="field-slug">
        <label>Estado da Conta</label>
        <select id="field-status">
            <option value="ativa">Ativa</option>
            <option value="suspensa">Suspensa</option>
        </select>
        <button onclick="salvarLoja()" class="badge btn-on" style="width:100%; padding:12px;">GUARDAR</button>
        <button onclick="fecharModal()" class="badge btn-off" style="width:100%; margin-top:5px; background: #eee; color: #333;">CANCELAR</button>
    </div>
</div>

<script>
    // Configurações Supabase
    const SB_URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
    const SB_KEY = "SUA_KEY_AQUI"; // Certifique-se de que esta KEY é a correta
    const _sb = supabase.createClient(SB_URL, SB_KEY);
    let dadosLocais = [];

    async function handleLogin() {
        const email = document.getElementById('log-email').value;
        const password = document.getElementById('log-pass').value;
        const { error } = await _sb.auth.signInWithPassword({ email, password });
        if (error) alert("Erro: " + error.message); else entrar();
    }

    async function entrar() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-panel').style.display = 'block';
        carregar();
    }

    // CORREÇÃO SINCRONIZAÇÃO: Carregar força a busca de dados novos
    async function carregar() {
        const { data, error } = await _sb.from('lojas').select('*').order('nome');
        if (error) {
            console.error("Erro ao carregar:", error);
            return;
        }
        dadosLocais = data;
        render(data);
    }

    function render(lista) {
        let tV = 0, tW = 0;
        const listaHtml = lista.map(l => {
            const v = Number(l.views_total || 0);
            const w = Number(l.whatsapp_total || 0);
            tV += v; tW += w;
            
            // Garantir que os valores booleanos sejam interpretados corretamente para as classes de CSS
            const catClass = l.status_catalogo ? 'btn-on' : 'btn-off';
            const digClass = l.status_digital_box ? 'btn-on' : 'btn-off';

            return `
                <tr>
                    <td><strong>${l.nome}</strong><br><small style="color:var(--muted)">/${l.slug}</small></td>
                    <td>
                        <button class="badge ${catClass}" onclick="up('${l.id}','status_catalogo',${l.status_catalogo})">CATÁLOGO</button>
                        <button class="badge ${digClass}" onclick="up('${l.id}','status_digital_box',${l.status_digital_box})">DIGITALBOX</button>
                    </td>
                    <td><i class="fas fa-eye"></i> ${v} | <i class="fab fa-whatsapp"></i> ${w}</td>
                    <td>
                        <button class="badge ${l.status === 'ativa' ? 'btn-on' : 'btn-susp'}" onclick="toggleStatus('${l.id}', '${l.status}')">
                            ● ${(l.status || 'ativa').toUpperCase()}
                        </button>
                    </td>
                    <td style="text-align:right">
                        <button class="action-btn" onclick='abrirEditar(${JSON.stringify(l)})'><i class="fas fa-edit"></i></button>
                        <button class="action-btn" onclick="apagar('${l.id}', '${l.nome}')"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                    </td>
                </tr>`;
        }).join('');

        document.getElementById('lista-lojas').innerHTML = listaHtml;
        document.getElementById('st-lojas').innerText = lista.length;
        document.getElementById('st-views').innerText = tV;
        document.getElementById('st-wpp').innerText = tW;
    }

    // CORREÇÃO SINCRONIZAÇÃO: Função 'up' atualiza e recarrega imediatamente
    async function up(id, campo, valor) {
        const novoValor = !valor;
        const { error } = await _sb.from('lojas').update({ [campo]: novoValor }).eq('id', id);
        if (error) alert("Erro ao atualizar: " + error.message); 
        else carregar(); 
    }

    async function toggleStatus(id, atual) {
        const novo = atual === 'ativa' ? 'suspensa' : 'ativa';
        const { error } = await _sb.from('lojas').update({ status: novo }).eq('id', id);
        if (error) alert("Erro: " + error.message);
        else carregar();
    }

    async function apagar(id, nome) {
        if(confirm(`Deseja apagar definitivamente a loja ${nome}?`)) {
            const { error } = await _sb.from('lojas').delete().eq('id', id);
            if (error) alert("Erro ao eliminar: " + error.message);
            else carregar();
        }
    }

    function abrirModal() {
        document.getElementById('modal-title').innerText = "Nova Loja";
        document.getElementById('edit-id').value = "";
        document.getElementById('field-nome').value = "";
        document.getElementById('field-slug').value = "";
        document.getElementById('field-status').value = "ativa";
        document.getElementById('modalLoja').style.display = 'flex';
    }

    function abrirEditar(loja) {
        document.getElementById('modal-title').innerText = "Editar Loja";
        document.getElementById('edit-id').value = loja.id;
        document.getElementById('field-nome').value = loja.nome;
        document.getElementById('field-slug').value = loja.slug;
        document.getElementById('field-status').value = loja.status || "ativa";
        document.getElementById('modalLoja').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modalLoja').style.display = 'none'; }

    async function salvarLoja() {
        const id = document.getElementById('edit-id').value;
        const obj = { 
            nome: document.getElementById('field-nome').value, 
            slug: document.getElementById('field-slug').value, 
            status: document.getElementById('field-status').value 
        };
        
        let res;
        if (id) res = await _sb.from('lojas').update(obj).eq('id', id);
        else res = await _sb.from('lojas').insert([obj]);

        if (res.error) alert("Erro ao guardar: " + res.error.message);
        else {
            fecharModal(); 
            carregar();
        }
    }

    function filtrar() {
        const t = document.getElementById('search').value.toLowerCase();
        render(dadosLocais.filter(l => l.nome.toLowerCase().includes(t) || l.slug.toLowerCase().includes(t)));
    }

    function logout() { _sb.auth.signOut().then(() => location.reload()); }
    
    _sb.auth.getSession().then(({data}) => { 
        if (data.session) entrar(); 
    });
</script>
</body>
</html>
