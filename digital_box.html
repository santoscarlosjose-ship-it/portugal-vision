<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Montra Digital | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; cursor: pointer; }
        
        #slider { width: 100%; height: 100%; position: relative; }

        .slide { 
            position: absolute; inset: 0; opacity: 0; 
            transition: opacity 2s ease-in-out; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .slide.active { opacity: 1; z-index: 10; }

        .slide img { 
            width: 100%; height: 100%; object-fit: cover; 
            transform: scale(1);
            transition: transform 10s linear; 
        }

        .slide.active img { transform: scale(1.15) translateX(10px); }

        .overlay { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 80%); 
            color: white; padding: 100px 50px 120px;
            z-index: 20;
            transform: translateY(20px);
            transition: transform 1.5s ease-out;
        }

        .slide.active .overlay { transform: translateY(0); }

        .overlay p { font-size: 1.8em; opacity: 0.9; margin: 0; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .overlay h1 { font-size: 5em; margin: 10px 0; font-weight: 800; line-height: 1; }
        .overlay h2 { font-size: 3.5em; color: #38bdf8; margin: 0; font-weight: 700; }

        .promo-badge {
            position: absolute; top: 50px; right: 50px;
            background: #e63946; color: white;
            padding: 25px 35px; border-radius: 50%;
            font-size: 2.5em; font-weight: 900;
            box-shadow: 0 15px 35px rgba(230, 57, 70, 0.4);
            z-index: 30;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 2s infinite;
        }

        .legal-footer {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.5);
            padding: 15px 50px;
            font-size: 0.85em;
            z-index: 100;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.4;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="slider"></div>

    <div class="legal-footer">
        As imagens, descrições e preços apresentados são da inteira responsabilidade do anunciante. 
        A plataforma <b>Portugal Vision</b> não se responsabiliza por este conteúdo, 
        em conformidade com os Termos e Condições e a legislação portuguesa em vigor.
    </div>

    <script>
        const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
        let currentIndex = 0;

        // Função para ativar Ecrã Inteiro ao clicar
        document.body.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Erro ao ativar Fullscreen: ${err.message}`);
                });
            }
        });

        async function initDigitalBox() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('loja');
            if (!slug) return;

            const { data: loja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
            
            if (loja) {
                const { data: produtos } = await _sb.from('produtos')
                    .select('*')
                    .eq('loja_id', loja.id)
                    .eq('oculto', false);

                if (!produtos || produtos.length === 0) return;

                const slider = document.getElementById('slider');
                slider.innerHTML = produtos.map((p, i) => {
                    const preco = parseFloat(p.preco) || 0;
                    const desc = parseInt(p.desconto_percent) || 0;
                    const final = desc > 0 ? (preco * (1 - desc / 100)).toFixed(2) : preco.toFixed(2);

                    return `
                        <div class="slide ${i === 0 ? 'active' : ''}">
                            <img src="${p.imagem_url || ''}" onerror="this.src='https://via.placeholder.com/1920x1080?text=Portugal+Vision'">
                            ${desc > 0 ? `<div class="promo-badge">-${desc}%</div>` : ''}
                            <div class="overlay">
                                <p>${loja.nome}</p>
                                <h1>${p.nome}</h1>
                                <h2>${final}€ ${desc > 0 ? `<span style="font-size:0.4em; text-decoration:line-through; opacity:0.5; margin-left:15px;">${preco.toFixed(2)}€</span>` : ''}</h2>
                            </div>
                        </div>
                    `;
                }).join('');

                const slidesElements = document.querySelectorAll('.slide');
                if (slidesElements.length > 1) {
                    setInterval(() => {
                        slidesElements[currentIndex].classList.remove('active');
                        currentIndex = (currentIndex + 1) % slidesElements.length;
                        slidesElements[currentIndex].classList.add('active');
                    }, 8000);
                }
            }
        }

        initDigitalBox();
    </script>
</body>
</html>
