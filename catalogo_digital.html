<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo Digital | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --radius-lg: 24px;
            --radius-md: 16px;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- HEADER & BANNER --- */
        .store-header {
            position: relative;
            height: 320px;
            background: var(--primary);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px 20px;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            inset: 0;
            opacity: 0.4;
            filter: blur(2px);
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        .store-info {
            position: relative;
            z-index: 2;
        }

        .store-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .store-logo img { width: 100%; height: 100%; object-fit: contain; }

        .store-name { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        
        .store-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* --- CATEGORIAS --- */
        .category-nav {
            position: sticky;
            top: 0;
            background: rgba(248, 250, 252, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .cat-item {
            display: inline-block;
            margin-left: 15px;
            padding: 8px 20px;
            background: white;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--muted);
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .cat-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* --- GRID DE PRODUTOS --- */
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .p-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .p-img-box {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Square aspect ratio */
            background: #f1f5f9;
        }

        .p-img-box img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .promo-tag {
            position: absolute;
            top: 10px; left: 10px;
            background: #ef4444;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 800;
        }

        .p-details { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .p-name {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.4em;
        }

        .price-box { margin-top: auto; }
        .price-final { font-size: 1.1rem; font-weight: 800; color: var(--primary); }
        .price-old { font-size: 0.8rem; text-decoration: line-through; color: var(--muted); margin-left: 5px; }

        .btn-add {
            width: 100%;
            background: #f1f5f9;
            border: none;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add:active { transform: scale(0.95); background: var(--primary); color: white; }

        /* --- CARRINHO FLUTUANTE --- */
        .cart-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }

        .cart-info { display: flex; align-items: center; gap: 15px; }
        .cart-count {
            background: white;
            color: var(--primary);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
        }

        /* --- MODAL CARRINHO --- */
        .modal-cart {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-items-list { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .cart-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        
        .item-details { flex-grow: 1; }
        .item-row { display: flex; justify-content: space-between; margin-top: 5px; }

        .qty-controls { display: flex; align-items: center; gap: 12px; }
        .btn-qty {
            width: 28px; height: 28px; border-radius: 8px;
            border: 1px solid #ddd; background: white; font-weight: 800;
        }

        .modal-footer {
            padding: 20px;
            background: #f8fafc;
            border-top: 1px solid #eee;
        }

        .btn-whatsapp {
            width: 100%;
            background: #25d366;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* --- FOOTER --- */
        .footer {
            padding: 40px 20px 100px;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }

        /* Mensagem de Bloqueio */
        #block-screen {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
    </style>
</head>
<body>

<div id="block-screen">
    <i class="fas fa-lock" style="font-size: 3rem; color: #ef4444; margin-bottom: 20px;"></i>
    <h1 style="margin-bottom: 10px;">Acesso Indisponível</h1>
    <p id="block-msg">Este catálogo não se encontra ativo no momento.</p>
</div>

<header class="store-header" id="header-render">
    </header>

<nav class="category-nav" id="cat-nav">
    </nav>

<div class="container">
    <div class="products-grid" id="p-grid">
        </div>
</div>

<footer class="footer">
    <p>&copy; 2024 Portugal Vision. Todos os direitos reservados.</p>
    <p style="margin-top:10px; opacity:0.6;">As imagens e preços são da inteira responsabilidade do anunciante.</p>
</footer>

<div class="cart-bar" id="cart-bar" onclick="toggleCartModal(true)">
    <div class="cart-info">
        <div class="cart-count" id="cart-count">0</div>
        <span style="font-weight:700;">Ver Carrinho</span>
    </div>
    <div id="cart-total-bar" style="font-weight:800; font-size:1.1rem;">0.00€</div>
</div>

<div class="modal-cart" id="modal-cart">
    <div class="modal-header">
        <h2 style="font-weight:800; letter-spacing:-1px;">Meu Pedido</h2>
        <button onclick="toggleCartModal(false)" style="border:none; background:none; font-size:1.5rem;"><i class="fas fa-times"></i></button>
    </div>
    
    <div class="cart-items-list" id="cart-items-list">
        </div>

    <div class="modal-footer">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span style="font-weight:600; color:var(--muted);">Total do Pedido:</span>
            <span id="cart-total-modal" style="font-weight:800; font-size:1.4rem; color:var(--primary);">0.00€</span>
        </div>
        <button class="btn-whatsapp" onclick="enviarWhatsapp()">
            <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
        </button>
    </div>
</div>

<script>
// CREDENCIAIS PORTUGAL VISION
    const _URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
    const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk";
    const _sb = supabase.createClient(_URL, _KEY);

    let currentStore = null;
    let allProducts = [];
    let cart = [];

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('loja');
        
        if(!slug) {
            window.location.href = "https://portugalvision.pt";
            return;
        }

        const { data: loja } = await _sb.from('lojas').select('*').eq('slug', slug).single();

        // SEGURANÇA: Verificação do Master
        if(!loja || loja.status !== 'ativa' || !loja.status_catalogo) {
            document.getElementById('block-screen').style.display = 'flex';
            return;
        }

        currentStore = loja;
        
        // Registar Visita Automática
        await _sb.from('metricas_cliques').insert([{ loja_id: loja.id, tipo: 'view_loja' }]);

        renderHeader();
        loadProducts();
    }

    function renderHeader() {
        document.getElementById('header-render').innerHTML = `
            <img src="${currentStore.capa_url || 'https://images.unsplash.com/photo-1441986300917-64674bd600d8'}" class="header-bg">
            <div class="store-info">
                <div class="store-logo">
                    <img src="${currentStore.logo_url || 'https://via.placeholder.com/100'}">
                </div>
                <h1 class="store-name">${currentStore.nome}</h1>
                <div class="store-badges">
                    <span class="badge"><i class="fas fa-check-circle"></i> Verificado</span>
                    <span class="badge"><i class="fas fa-truck"></i> Entregas Disponíveis</span>
                </div>
            </div>
        `;
    }

    async function loadProducts() {
        const { data } = await _sb.from('produtos')
            .select('*')
            .eq('loja_id', currentStore.id)
            .eq('oculto', false)
            .order('categoria');
        
        allProducts = data;
        renderCategories();
        renderProducts();
    }

    function renderCategories() {
        const cats = ['Todos', ...new Set(allProducts.map(p => p.categoria || 'Geral'))];
        document.getElementById('cat-nav').innerHTML = cats.map((c, i) => `
            <div class="cat-item ${i===0?'active':''}" onclick="filterCat('${c}', this)">${c}</div>
        `).join('');
    }

    function renderProducts(filter = 'Todos') {
        const filtered = filter === 'Todos' ? allProducts : allProducts.filter(p => p.categoria === filter);
        const grid = document.getElementById('p-grid');
        
        grid.innerHTML = filtered.map(p => {
            const final = p.desconto_percent > 0 ? (p.preco * (1 - p.desconto_percent/100)) : p.preco;
            return `
                <div class="p-card">
                    <div class="p-img-box">
                        ${p.desconto_percent > 0 ? `<div class="promo-tag">-${p.desconto_percent}%</div>` : ''}
                        <img src="${p.imagem_url || 'https://via.placeholder.com/300'}" loading="lazy">
                    </div>
                    <div class="p-details">
                        <div class="p-name">${p.nome}</div>
                        <div class="price-box">
                            <span class="price-final">${final.toFixed(2)}€</span>
                            ${p.desconto_percent > 0 ? `<span class="price-old">${p.preco.toFixed(2)}€</span>` : ''}
                        </div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">ADICIONAR</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filterCat(cat, el) {
        document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        renderProducts(cat);
    }

    // --- LÓGICA DO CARRINHO ---
    function addToCart(id) {
        const prod = allProducts.find(p => p.id === id);
        const exists = cart.find(item => item.id === id);
        
        if(exists) exists.qty++;
        else cart.push({...prod, qty: 1});
        
        updateUI();
    }

    function updateUI() {
        const totalItems = cart.reduce((acc, i) => acc + i.qty, 0);
        const totalPrice = cart.reduce((acc, i) => {
            const price = i.desconto_percent > 0 ? (i.preco * (1 - i.desconto_percent/100)) : i.preco;
            return acc + (price * i.qty);
        }, 0);

        document.getElementById('cart-bar').style.display = totalItems > 0 ? 'flex' : 'none';
        document.getElementById('cart-count').innerText = totalItems;
        document.getElementById('cart-total-bar').innerText = totalPrice.toFixed(2) + '€';
        document.getElementById('cart-total-modal').innerText = totalPrice.toFixed(2) + '€';
        
        renderCartItems();
    }

    function renderCartItems() {
        const list = document.getElementById('cart-items-list');
        list.innerHTML = cart.map(item => {
            const price = item.desconto_percent > 0 ? (item.preco * (1 - item.desconto_percent/100)) : item.preco;
            return `
                <div class="cart-item">
                    <img src="${item.imagem_url}">
                    <div class="item-details">
                        <div style="font-weight:700;">${item.nome}</div>
                        <div class="item-row">
                            <div class="qty-controls">
                                <button class="btn-qty" onclick="changeQty('${item.id}', -1)">-</button>
                                <span style="font-weight:800;">${item.qty}</span>
                                <button class="btn-qty" onclick="changeQty('${item.id}', 1)">+</button>
                            </div>
                            <div style="font-weight:700;">${(price * item.qty).toFixed(2)}€</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function changeQty(id, delta) {
        const index = cart.findIndex(i => i.id === id);
        cart[index].qty += delta;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateUI();
    }

    function toggleCartModal(show) {
        document.getElementById('modal-cart').style.display = show ? 'flex' : 'none';
    }

    async function enviarWhatsapp() {
        // Registar clique no WhatsApp para as estatísticas
        await _sb.from('metricas_cliques').insert([{ loja_id: currentStore.id, tipo: 'click_whatsapp' }]);

        let msg = `*Novo Pedido - ${currentStore.nome}*\n--------------------------\n`;
        cart.forEach(i => {
            msg += `${i.qty}x ${i.nome} - ${(i.qty * (i.desconto_percent > 0 ? i.preco * (1 - i.desconto_percent/100) : i.preco)).toFixed(2)}€\n`;
        });
        msg += `\n*TOTAL: ${document.getElementById('cart-total-modal').innerText}*`;
        
        const tel = currentStore.whatsapp || "351912345678";
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
    }

    init();
</script>

</body>
</html>
