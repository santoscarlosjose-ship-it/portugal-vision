<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #1d3557; --s: #457b9d; --ok: #25d366; --err: #e63946; --gray: #f4f4f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray); margin: 0; padding: 0; padding-bottom: 100px; color: #333; }
        
        .header { background: white; padding: 30px 20px; text-align: center; box-shadow: 0 2px 15px rgba(0,0,0,0.08); border-bottom: 3px solid var(--p); }
        .logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); padding: 2px; background: white; margin-bottom: 10px; }
        .header h2 { margin: 5px 0; color: var(--p); font-size: 1.5em; text-transform: uppercase; }
        .morada { color: #666; font-size: 0.85em; display: block; max-width: 80%; margin: 0 auto; line-height: 1.4; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 12px; text-align: center; }
        .info strong { display: block; color: #222; font-size: 0.95em; margin-bottom: 5px; min-height: 2.2em; }
        .price { color: var(--p); font-weight: 800; font-size: 1.1em; display: block; }

        .btn-wpp { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--ok); color: white; padding: 15px 30px; border-radius: 50px;
            text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); z-index: 1000; width: 80%; max-width: 300px; justify-content: center;
        }
    </style>
</head>
<body>

<div id="loja-header" class="header">
    <img id="v-logo" class="logo" src="" style="display:none;">
    <h2 id="v-nome">A carregar...</h2>
    <span id="v-morada" class="morada"></span>
</div>

<div id="lista-produtos" class="grid"></div>

<a id="btn-whatsapp" href="#" class="btn-wpp" style="display: none;" onclick="registarClique()">
    <span>Encomendar via WhatsApp</span>
</a>

<script>
    const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('loja');
        
        if (!slug) {
            document.getElementById('v-nome').innerText = "Loja não encontrada";
            return;
        }

        // Buscar dados da loja
        const { data: loja, error: erroLoja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
        
        if (erroLoja || !loja) {
            console.error("Erro ao carregar loja:", erroLoja);
            document.getElementById('v-nome').innerText = "Loja não encontrada";
            return;
        }

        // Preencher cabeçalho com segurança (sem undefined)
        document.getElementById('v-nome').innerText = loja.nome_loja || "Portugal Vision";
        document.getElementById('v-morada').innerText = loja.morada || "";
        
        if (loja.url_logo) {
            const logoImg = document.getElementById('v-logo');
            logoImg.src = loja.url_logo;
            logoImg.style.display = 'inline-block';
        }

        const btnWpp = document.getElementById('btn-whatsapp');
        btnWpp.href = `https://wa.me/${loja.whatsapp}?text=Olá! Vi o catálogo e gostaria de informações.`;
        btnWpp.style.display = 'flex';

        // Buscar produtos
        const { data: produtos, error: erroProdutos } = await _sb.from('produtos').select('*').eq('loja_id', loja.id);
        
        const lista = document.getElementById('lista-produtos');
        if (produtos && produtos.length > 0) {
            lista.innerHTML = produtos.map(p => `
                <div class="card">
                    <div class="img-container">
                        <img src="${p.url_foto || ''}" 
                             onerror="this.src='https://via.placeholder.com/300?text=Sem+Foto'" 
                             alt="${p.nome_artigo || 'Produto'}">
                    </div>
                    <div class="info">
                        <strong>${p.nome_artigo || 'Sem nome'}</strong>
                        <span class="price">${p.preco ? p.preco + '€' : 'Sob consulta'}</span>
                    </div>
                </div>
            `).join('');
        } else {
            lista.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>Sem produtos disponíveis de momento.</p>";
        }
    }

    init();
</script>
</body>
</html>
