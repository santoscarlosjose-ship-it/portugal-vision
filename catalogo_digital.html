<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #2c3e50; --s: #a89f91; --ok: #27ae60; --accent: #c0392b;
            --bg: #fdfbf7; --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--p); margin: 0; padding-bottom: 20px;
            background-image: radial-gradient(#e5e5f7 0.5px, transparent 0.5px); background-size: 20px 20px;
        }

        .header { background: white; padding: 50px 20px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 4px solid white; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .header h2 { font-family: 'Playfair Display', serif; font-size: 2.2em; margin: 0; color: #1a1a1a; text-transform: uppercase; letter-spacing: 1px; }

        .categories-container { padding: 20px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .cat-btn { background: white; border: 1px solid #eee; color: #777; padding: 10px 22px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .cat-btn.active { background: var(--p); color: white; border-color: var(--p); }

        .search-container { padding: 0 20px 30px; max-width: 600px; margin: auto; }
        #search-input { width: 100%; padding: 16px 25px; border-radius: 50px; border: 1px solid #eee; background: white; font-size: 16px; outline: none; box-shadow: var(--card-shadow); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: auto; }
        
        /* CARD COM ALTURA FIXA E BORDAS CORRIGIDAS */
        .card { background: white; border-radius: 24px; overflow: hidden; box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.06); transition: 0.4s; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-8px); }

        /* MOLDURA E IMAGEM */
        .img-container { width: 100%; aspect-ratio: 4/3; overflow: hidden; background: #fff; padding: 12px; box-sizing: border-box; }
        .card img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; transition: 0.8s; border: 1px solid rgba(0,0,0,0.03); }

        .info { padding: 20px; text-align: center; display: flex; flex-direction: column; flex-grow: 1; }
        .info strong { font-size: 1.25em; color: #1a1a1a; display: block; margin-bottom: 8px; min-height: 1.2em; }
        
        .price-box { display: flex; align-items: baseline; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .price { font-size: 1.5em; font-weight: 800; color: var(--p); }
        .old-price { color: #b2bec3; text-decoration: line-through; font-size: 1em; }
        .discount-label { color: var(--accent); font-weight: 600; font-size: 0.85em; background: #fff5f5; padding: 2px 8px; border-radius: 6px; }

        /* BOTÃO ENQUADRADO */
        .btn-item-wpp { background: var(--ok); color: white; text-decoration: none; padding: 14px; border-radius: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; cursor: pointer; border: none; width: 100%; box-sizing: border-box; margin-top: auto; }
        .btn-item-wpp:hover { opacity: 0.9; }

        .footer { background: white; padding: 60px 20px; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }
        .map-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 25px; margin-bottom: 30px; }
        .btn-map { padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .google-maps { background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; }
        .waze { background: #33ccff; color: white; }

        /* RODAPÉ LEGAL CORRIGIDO COM TEXTO VISÍVEL */
        .legal-footer { border-top: 1px solid #f0f0f0; padding: 40px 20px; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .legal-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; list-style: none; padding: 0; margin-bottom: 10px; }
        .legal-links a { color: #95a5a6; text-decoration: none; font-size: 0.85em; transition: 0.3s; cursor: pointer; font-weight: 600; }
        .legal-links a:hover { color: var(--p); }
        
        .complaints-book { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .complaints-book a { display: flex; align-items: center; gap: 8px; color: #95a5a6; text-decoration: none; font-size: 0.85em; font-weight: 600; }
        .complaints-book img { height: 35px; width: auto; transition: 0.3s; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto; position: relative; text-align: left; line-height: 1.6; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #999; }
        .modal-content h3 { font-family: 'Playfair Display'; color: var(--p); margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="legalModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div id="modalText"></div>
    </div>
</div>

<div class="header">
    <img id="v-logo" class="logo" src="" style="display:none;">
    <h2 id="v-nome">A carregar...</h2>
</div>

<div class="categories-container" id="cat-list"></div>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Pesquisar no menu...">
</div>

<div id="lista-produtos" class="grid"></div>

<div class="footer">
    <h3 style="font-family: 'Playfair Display';">Onde nos encontrar</h3>
    <p id="footer-morada" style="color: #636e72; font-size: 0.95em;"></p>
    <div class="map-buttons">
        <a id="link-gmaps" target="_blank" class="btn-map google-maps">
            <i class="fas fa-map-marker-alt"></i> Google Maps
        </a>
        <a id="link-waze" target="_blank" class="btn-map waze">
            <i class="fab fa-waze"></i> Waze
        </a>
    </div>

    <div class="legal-footer">
        <ul class="legal-links">
            <li><a onclick="showLegal('termos')">Termos e Condições</a></li>
            <li><a onclick="showLegal('privacidade')">Privacidade</a></li>
            <li><a onclick="showLegal('cookies')">Cookies</a></li>
        </ul>
        
        <div class="complaints-book">
            <a href="https://www.livroreclamacoes.pt/Inicio/" target="_blank">
                <img src="https://www.livroreclamacoes.pt/assets/img/logo-livro-reclamacoes.png" alt="Livro Reclamações">
                <span>Livro de Reclamações</span>
            </a>
        </div>
        
        <p style="font-size: 0.75em; color: #bdc3c7; margin-top: 20px;">
            © 2026 Portugal Vision. Todos os direitos reservados.
        </p>
    </div>
</div>

<script>
    const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
    let todosProdutos = [];
    let categoriaSelecionada = 'todos';
    let whatsappLoja = "";
    let idDaLoja = null;

    const legalTexts = {
        termos: `<h3>Termos e Condições</h3><p>Este catálogo é uma plataforma de exposição da Portugal Vision...</p>`,
        privacidade: `<h3>Política de Privacidade</h3><p>Não recolhemos dados sensíveis...</p>`,
        cookies: `<h3>Política de Cookies</h3><p>Utilizamos apenas cookies essenciais...</p>`
    };

    function showLegal(type) {
        document.getElementById('modalText').innerHTML = legalTexts[type];
        document.getElementById('legalModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('legalModal').style.display = 'none'; }

    async function registarClique(tipo) {
        if (!idDaLoja) return;
        try { await _sb.from('metricas_cliques').insert([{ loja_id: idDaLoja, tipo: tipo }]); } catch (e) {}
    }

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('loja');
        if (!slug) return;

        const { data: loja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
        if (loja) {
            idDaLoja = loja.id;
            whatsappLoja = (loja.telefone || "").replace(/\s/g, "");
            document.getElementById('v-nome').innerText = loja.nome;
            document.getElementById('footer-morada').innerText = loja.morada || "";
            registarClique('view_loja');

            const mEnc = encodeURIComponent(loja.morada || "");
            document.getElementById('link-gmaps').href = `https://www.google.com/maps/search/?api=1&query=${mEnc}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${mEnc}&navigate=yes`;

            if (loja.logo_url) {
                const logo = document.getElementById('v-logo');
                logo.src = loja.logo_url; logo.style.display = 'inline-block';
            }

            const { data: produtos } = await _sb.from('produtos').select('*').eq('loja_id', loja.id).eq('oculto', false);
            todosProdutos = produtos || [];
            
            const cats = [...new Set(todosProdutos.map(p => p.categoria))].filter(Boolean);
            document.getElementById('cat-list').innerHTML = `<button class="cat-btn active" onclick="setCategoria('todos', this)">Todos</button>` +
                cats.map(c => `<button class="cat-btn" onclick="setCategoria('${c}', this)">${c}</button>`).join('');

            renderizar(todosProdutos);
        }
    }

    function renderizar(lista) {
        const container = document.getElementById('lista-produtos');
        container.innerHTML = lista.map(p => {
            const preco = parseFloat(p.preco) || 0;
            const desc = parseInt(p.desconto_percent) || 0;
            const final = desc > 0 ? (preco * (1 - desc / 100)).toFixed(2) : preco.toFixed(2);
            const wppUrl = `https://wa.me/${whatsappLoja}?text=${encodeURIComponent('Olá, gostaria de reservar: ' + p.nome)}`;

            return `
                <div class="card">
                    <div class="img-container">
                        <img src="${p.imagem_url || ''}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=Portugal+Vision'">
                    </div>
                    <div class="info">
                        <strong>${p.nome}</strong>
                        <div class="price-box">
                            <span class="price">${final}€</span>
                            ${desc > 0 ? `<span class="old-price">${preco.toFixed(2)}€</span><span class="discount-label">-${desc}%</span>` : ''}
                        </div>
                        <a onclick="registarClique('click_whatsapp'); window.open('${wppUrl}', '_blank')" class="btn-item-wpp">
                            <i class="fab fa-whatsapp"></i> Reservar agora
                        </a>
                    </div>
                </div>`;
        }).join('');
    }

    function setCategoria(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        categoriaSelecionada = cat;
        aplicarFiltros();
    }

    document.getElementById('search-input').addEventListener('input', aplicarFiltros);

    function aplicarFiltros() {
        const termo = document.getElementById('search-input').value.toLowerCase();
        let filtrados = todosProdutos.filter(p => (categoriaSelecionada === 'todos' || p.categoria === categoriaSelecionada) && p.nome.toLowerCase().includes(termo));
        renderizar(filtrados);
    }

    init();
</script>
</body>
</html>
