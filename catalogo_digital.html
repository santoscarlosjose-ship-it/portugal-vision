<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #2c3e50; 
            --s: #a89f91; /* Tom terra suave */
            --ok: #27ae60; 
            --accent: #c0392b;
            --bg: #fdfbf7; /* Creme / Branco Sujo */
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--p);
            margin: 0; 
            padding-bottom: 20px;
            background-image: radial-gradient(#e5e5f7 0.5px, transparent 0.5px); /* Relevo subtil */
            background-size: 20px 20px;
        }

        .header { 
            background: white;
            padding: 50px 20px; 
            text-align: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .logo { 
            width: 110px; height: 110px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid white;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
        }

        .header h2 { font-family: 'Playfair Display', serif; font-size: 2.2em; margin: 0; color: #1a1a1a; }

        /* Categorias e Pesquisa */
        .categories-container { padding: 20px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .cat-btn { background: white; border: 1px solid #eee; color: #777; padding: 10px 22px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .cat-btn.active { background: var(--p); color: white; border-color: var(--p); }

        .search-container { padding: 0 20px 30px; max-width: 600px; margin: auto; }
        #search-input { 
            width: 100%; padding: 16px 25px; border-radius: 50px; border: 1px solid #eee;
            background: white; font-size: 16px; outline: none; box-shadow: var(--card-shadow);
        }

        /* Cartões de Produto */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { 
            background: white; border-radius: 24px; overflow: hidden; 
            box-shadow: var(--card-shadow); border: 1px solid rgba(0,0,0,0.03);
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .img-container { width: 100%; aspect-ratio: 4/3; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .card:hover img { transform: scale(1.1); }

        .info { padding: 25px; text-align: left; }
        .info strong { font-size: 1.3em; color: #1a1a1a; display: block; margin-bottom: 8px; }

        /* Preços Elegantes */
        .price-box { display: flex; align-items: baseline; gap: 12px; margin: 15px 0; }
        .price { font-size: 1.6em; font-weight: 800; color: var(--p); letter-spacing: -0.5px; }
        .old-price { color: #b2bec3; text-decoration: line-through; font-size: 1em; }
        .discount-label { color: var(--accent); font-weight: 600; font-size: 0.9em; background: #fff5f5; padding: 2px 8px; border-radius: 6px; }

        /* Botão WhatsApp */
        .btn-item-wpp {
            background: var(--ok); color: white; text-decoration: none; padding: 14px;
            border-radius: 16px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }

        /* Rodapé com Mapas */
        .footer { background: white; padding: 60px 20px; text-align: center; border-top: 1px solid #eee; margin-top: 50px; }
        .map-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }
        .btn-map { 
            padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.9em;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
        }
        .google-maps { background: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; }
        .waze { background: #33ccff; color: white; }
    </style>
</head>
<body>

<div class="header">
    <img id="v-logo" class="logo" src="" style="display:none;">
    <h2 id="v-nome">A carregar...</h2>
    <p id="v-morada" style="color: #636e72; margin: 10px 0 0;"></p>
</div>

<div class="categories-container" id="cat-list"></div>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Pesquisar sabor...">
</div>

<div id="lista-produtos" class="grid"></div>

<div class="footer">
    <h3 style="font-family: 'Playfair Display';">Visite-nos</h3>
    <p id="footer-morada" style="color: #636e72;"></p>
    <div class="map-buttons">
        <a id="link-gmaps" target="_blank" class="btn-map google-maps">
            <i class="fas fa-map-marker-alt"></i> Google Maps
        </a>
        <a id="link-waze" target="_blank" class="btn-map waze">
            <i class="fab fa-waze"></i> Waze
        </a>
    </div>
    <p style="margin-top: 40px; font-size: 0.8em; color: #b2bec3;">&copy; 2026 Portugal Vision</p>
</div>

<script>
    const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
    let todosProdutos = [];
    let whatsappLoja = "";

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('loja');
        if (!slug) return;

        const { data: loja } = await _sb.from('lojas').select('*').eq('slug', slug).single();
        
        if (loja) {
            whatsappLoja = (loja.telefone || "").replace(/\s/g, "");
            document.getElementById('v-nome').innerText = loja.nome;
            const moradaTexto = loja.morada || "Rua Dom Dinis, 2560-433 Silveira Torres Vedras";
            document.getElementById('v-morada').innerText = moradaTexto;
            document.getElementById('footer-morada').innerText = moradaTexto;
            
            // Configurar links dos mapas
            const moradaEncoded = encodeURIComponent(moradaTexto);
            document.getElementById('link-gmaps').href = `https://www.google.com/maps/search/?api=1&query=${moradaEncoded}`;
            document.getElementById('link-waze').href = `https://waze.com/ul?q=${moradaEncoded}&navigate=yes`;

            if (loja.logo_url) {
                const logoImg = document.getElementById('v-logo');
                logoImg.src = loja.logo_url;
                logoImg.style.display = 'inline-block';
            }

            const { data: produtos } = await _sb.from('produtos').select('*').eq('loja_id', loja.id).eq('oculto', false).order('created_at', {ascending: false});
            todosProdutos = produtos || [];
            
            // Gerar categorias
            const cats = [...new Set(todosProdutos.map(p => p.categoria))].filter(Boolean);
            const catList = document.getElementById('cat-list');
            catList.innerHTML = `<button class="cat-btn active" onclick="filtrar('todos', this)">Todos</button>` +
                cats.map(c => `<button class="cat-btn" onclick="filtrar('${c}', this)">${c}</button>`).join('');

            renderizar(todosProdutos);
        }
    }

    function renderizar(lista) {
        const container = document.getElementById('lista-produtos');
        container.innerHTML = lista.map(p => {
            const precoBase = parseFloat(p.preco) || 0;
            const desc = parseInt(p.desconto_percent) || 0;
            const precoFinal = desc > 0 ? (precoBase * (1 - desc / 100)).toFixed(2) : precoBase.toFixed(2);

            return `
                <div class="card">
                    <div class="img-container">
                        <img src="${p.imagem_url || ''}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=Sabor+Santos'">
                    </div>
                    <div class="info">
                        <strong>${p.nome || 'Prato da Casa'}</strong>
                        <div class="price-box">
                            <span class="price">${precoFinal}€</span>
                            ${desc > 0 ? `<span class="old-price">${precoBase.toFixed(2)}€</span>` : ''}
                            ${desc > 0 ? `<span class="discount-label">-${desc}%</span>` : ''}
                        </div>
                        <a href="https://wa.me/${whatsappLoja}?text=Olá! Gostaria de reservar: ${p.nome}" target="_blank" class="btn-item-wpp">
                            <i class="fab fa-whatsapp"></i> Pedir por WhatsApp
                        </a>
                    </div>
                </div>
            `;
        }).join('');
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderizar(cat === 'todos' ? todosProdutos : todosProdutos.filter(p => p.categoria === cat));
    }

    init();
</script>
</body>
</html>
