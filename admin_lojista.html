<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Lojista | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- AUTH SCREEN --- */
        #auth-container {
            position: fixed;
            inset: 0;
            background: var(--primary);
            background: radial-gradient(circle at top right, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            overflow-y: auto;
            padding: 2rem 0;
        }

        .auth-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            margin: auto;
        }

        .auth-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .auth-card h2 { margin-bottom: 1.5rem; font-weight: 700; color: var(--primary); }

        .auth-toggle {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-toggle span {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }

        /* --- NAVIGATION --- */
        nav {
            background: var(--primary);
            color: var(--white);
            padding: 0.75rem 2rem;
            display: none;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* --- MAIN LAYOUT --- */
        main {
            max-width: 1280px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
            display: none;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
        }

        .header-info h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
        }

        /* --- PRODUCT GRID --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 24px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #f1f5f9;
        }

        .card-body {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .category-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .price-wrapper {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .current-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- BUTTONS --- */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-secondary { background: var(--white); color: var(--primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--bg); border-color: var(--text-muted); }

        .btn-danger { background: #fee2e2; color: var(--danger); }
        .btn-danger:hover { background: #fecaca; }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 50px;
            gap: 10px;
            margin-top: auto;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .modal-container {
            background: var(--white);
            width: 100%;
            max-width: 650px;
            border-radius: 28px;
            padding: 2.5rem;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        /* --- FORMS --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group { margin-bottom: 1rem; }
        .full-width { grid-column: span 2; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        #preview-img-box {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            margin-top: 1rem;
            display: none;
        }

        .loader-spin {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .badge-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-on { background: #dcfce7; color: #166534; }
        .status-off { background: #f1f5f9; color: #475569; }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="auth-container">
    <div class="auth-card">
        <div class="auth-logo">PORTUGAL VISION</div>
        <h2 id="auth-title">Acesso Lojista</h2>
        
        <div id="auth-form" style="text-align:left">
            <div id="register-only-fields" style="display:none;">
                <div class="form-group">
                    <label>Nome da Loja</label>
                    <input type="text" id="reg-loja-nome" placeholder="Ex: Boutique Central">
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>NIF</label>
                        <input type="text" id="reg-loja-nif" placeholder="9 algarismos">
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="reg-loja-tel" placeholder="Ex: 912345678">
                    </div>
                </div>
                <div class="form-group">
                    <label>Morada Completa</label>
                    <input type="text" id="reg-loja-morada" placeholder="Rua, Número, Localidade">
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="auth-email" placeholder="ex: contacto@loja.pt">
            </div>
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" id="auth-pass" placeholder="••••••••">
            </div>

            <button class="btn btn-primary" style="width:100%; margin-top:1rem;" id="auth-main-btn" onclick="handleAuth()">
                ENTRAR NO PAINEL
            </button>
        </div>

        <div class="auth-toggle" id="auth-switcher">
            Não tem conta? <span onclick="toggleAuthMode(true)">Criar conta de Lojista</span>
        </div>
    </div>
</div>

<nav id="main-nav">
    <div class="nav-brand">
        <i class="fas fa-store"></i>
        PORTUGAL VISION <span style="font-weight:300; opacity:0.6;">| LOJISTA</span>
    </div>
    <div class="nav-user">
        <span id="loja-name-display" style="font-weight:600; font-size:0.9rem;">---</span>
        <button class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size:0.8rem;" onclick="handleLogout()">SAIR</button>
    </div>
</nav>

<main id="main-panel">
    <div class="page-header">
        <div class="header-info">
            <h1>Gestão de Produtos</h1>
            <p style="color:var(--text-muted)">Controle o seu catálogo digital em tempo real</p>
        </div>
        <button class="btn btn-primary" onclick="openProductModal()">
            <i class="fas fa-plus"></i> ADICIONAR NOVO PRODUTO
        </button>
    </div>
    <div class="products-grid" id="products-list"></div>
</main>

<div class="modal-overlay" id="productModal">
    <div class="modal-container">
        <h2 id="modal-title" style="margin-bottom:2rem; font-size:1.5rem;">Novo Produto</h2>
        <form id="productForm">
            <input type="hidden" id="edit-id">
            <div id="img-drop-area" onclick="document.getElementById('file-input').click()" style="border: 2px dashed var(--border); padding: 2rem; text-align: center; cursor: pointer; border-radius: 16px; margin-bottom: 1rem;">
                <i class="fas fa-cloud-upload-alt" style="font-size:2rem; color:var(--accent); margin-bottom:0.5rem;"></i>
                <p>Carregar Foto</p>
                <input type="file" id="file-input" hidden accept="image/*" onchange="previewFile(this)">
                <div id="preview-img-box"></div>
            </div>
            <div class="form-grid">
                <div class="form-group full-width"><label>Nome</label><input type="text" id="p-nome" required></div>
                <div class="form-group"><label>Preço (€)</label><input type="number" id="p-preco" step="0.01" required></div>
                <div class="form-group"><label>Desconto (%)</label><input type="number" id="p-desc" value="0"></div>
                <div class="form-group"><label>Categoria</label><select id="p-cat"><option>Geral</option><option>Novidades</option></select></div>
                <div class="form-group"><label>Visibilidade</label><select id="p-oculto"><option value="false">Visível</option><option value="true">Oculto</option></select></div>
                <div class="form-group full-width"><label>Descrição</label><textarea id="p-desc-text" rows="2"></textarea></div>
            </div>
            <div style="display:flex; gap:12px; margin-top:1.5rem;">
                <button type="button" class="btn btn-secondary" style="flex:1" onclick="closeProductModal()">CANCELAR</button>
                <button type="submit" class="btn btn-primary" style="flex:2" id="btn-save"><span id="save-text">GUARDAR</span></button>
            </div>
        </form>
    </div>
</div>

<script>
// Configurações atualizadas do Supabase
const SB_URL = "https://hhrmbrcaujfsqfanxqqq.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTQwODQ4MjksImV4cCI6MjAyOTY2MDgyOX0.vA-K5QpXU_D6w_7o9U-u5Wp6P0l1_T8_n8_m7_s7_g"; 

// Certifique-se de que a inicialização usa estas constantes
const _sb = supabase.createClient(SB_URL, SB_KEY);

    let currentLoja = null;
    let productsData = [];
    let isRegisterMode = false;

    function toggleAuthMode(toRegister) {
        isRegisterMode = toRegister;
        const title = document.getElementById('auth-title');
        const btn = document.getElementById('auth-main-btn');
        const regFields = document.getElementById('register-only-fields');
        const switcher = document.getElementById('auth-switcher');

        if(toRegister) {
            title.innerText = "Criar Nova Conta";
            btn.innerText = "REGISTAR E ENTRAR";
            regFields.style.display = 'block';
            switcher.innerHTML = 'Já tem conta? <span onclick="toggleAuthMode(false)">Fazer Login</span>';
        } else {
            title.innerText = "Acesso Lojista";
            btn.innerText = "ENTRAR NO PAINEL";
            regFields.style.display = 'none';
            switcher.innerHTML = 'Não tem conta? <span onclick="toggleAuthMode(true)">Criar conta de Lojista</span>';
        }
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;

        if(isRegisterMode) {
            const nomeLoja = document.getElementById('reg-loja-nome').value;
            const nif = document.getElementById('reg-loja-nif').value;
            const tel = document.getElementById('reg-loja-tel').value;
            const morada = document.getElementById('reg-loja-morada').value;

            if(!nomeLoja || !nif || !email || !pass) return alert("Por favor, preencha os campos obrigatórios.");

            const { data: authData, error: authErr } = await _sb.auth.signUp({ email, password: pass });
            if(authErr) return alert("Erro no registo: " + authErr.message);

            const slugLoja = nomeLoja.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-').replace(/[^\w-]/g, '');
            
            const { error: dbErr } = await _sb.from('lojas').insert([{
                nome: nomeLoja,
                nif: nif,
                telefone: tel,
                morada: morada,
                email_dono: email,
                slug: slugLoja
            }]);
            
            if(dbErr) return alert("Conta criada, mas erro ao guardar dados da loja: " + dbErr.message);
            alert("Conta e loja criadas com sucesso!");
            checkSession();
        } else {
            const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if(error) alert("Credenciais inválidas: " + error.message); else checkSession();
        }
    }

    async function checkSession() {
        const { data: { session } } = await _sb.auth.getSession();
        if(session) {
            const { data: loja } = await _sb.from('lojas').select('*').eq('email_dono', session.user.email).single();
            if(loja) {
                currentLoja = loja;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('main-panel').style.display = 'block';
                document.getElementById('loja-name-display').innerText = loja.nome;
                loadProducts();
            }
        }
    }

    // --- REUTILIZAÇÃO DAS FUNÇÕES DE PRODUTOS DO CÓDIGO ORIGINAL ---
    async function loadProducts() {
        const { data, error } = await _sb.from('produtos').select('*').eq('loja_id', currentLoja.id).order('created_at', {ascending: false});
        if(!error) { productsData = data; renderProducts(); }
    }

    function renderProducts() {
        const list = document.getElementById('products-list');
        list.innerHTML = productsData.map(p => `
            <div class="product-card">
                <div class="badge-status ${p.oculto ? 'status-off' : 'status-on'}">${p.oculto ? 'Oculto' : 'Ativo'}</div>
                <img src="${p.imagem_url || 'https://via.placeholder.com/400x300'}" class="product-img">
                <div class="card-body">
                    <div class="category-tag">${p.categoria || 'Geral'}</div>
                    <div class="product-name">${p.nome}</div>
                    <div class="current-price">${p.preco.toFixed(2)}€</div>
                    <div class="card-actions">
                        <button class="btn btn-secondary" onclick="editProduct('${p.id}')">EDITAR</button>
                        <button class="btn btn-danger" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function previewFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const box = document.getElementById('preview-img-box');
                box.style.display = 'block';
                box.style.backgroundImage = `url(${e.target.result})`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function openProductModal() { 
        document.getElementById('productForm').reset(); 
        document.getElementById('productModal').style.display = 'flex'; 
    }
    function closeProductModal() { document.getElementById('productModal').style.display = 'none'; }
    function handleLogout() { _sb.auth.signOut().then(() => location.reload()); }
    
    checkSession();
</script>
</body>
</html>
