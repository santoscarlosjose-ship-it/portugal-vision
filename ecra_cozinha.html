<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecrã da Cozinha | Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* TEMA DARK PARA A COZINHA */
        :root { 
            --bg-dark: #0f172a; 
            --bg-card: #1e293b; 
            --text-light: #f8fafc; 
            --text-muted: #94a3b8;
            --primary: #3b82f6; 
            --warning: #f59e0b; 
            --success: #10b981; 
            --danger: #ef4444;
            --border-color: #334155;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-light); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ECRÃ DE LOGIN */
        #login-screen { position: fixed; inset: 0; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { background: var(--bg-card); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid var(--border-color); }
        .input-form { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-light); border-radius: 10px; font-size: 16px; }
        .btn-login { background: var(--primary); color: white; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-login:hover { background: #2563eb; }

        /* CABEÇALHO */
        header { background: #0b1120; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); z-index: 10; }
        .logo-area h1 { margin: 0; font-size: 1.8em; font-weight: 900; color: #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .status-dot { width: 14px; height: 14px; background: var(--success); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }

        /* GRELHA PRINCIPAL */
        .main-content { display: flex; gap: 20px; padding: 20px; flex-grow: 1; overflow-x: auto; overflow-y: hidden; align-items: flex-start; scroll-behavior: smooth; }
        
        /* CARTÃO DE PEDIDO (TICKET) */
        .ticket { background: var(--bg-card); border-radius: 12px; width: 350px; min-width: 350px; display: flex; flex-direction: column; overflow: hidden; border: 2px solid var(--border-color); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); flex-shrink: 0; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* ESTADO: PENDENTE (Novo) */
        .ticket.estado-pendente { border-top: 6px solid var(--danger); }
        .ticket.estado-pendente .ticket-header { background: rgba(239, 68, 68, 0.1); }
        
        /* ESTADO: PREPARAÇÃO */
        .ticket.estado-preparacao { border-top: 6px solid var(--warning); border-color: var(--warning); transform: scale(1.02); box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); }
        .ticket.estado-preparacao .ticket-header { background: rgba(245, 158, 11, 0.15); }

        .ticket-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .mesa-numero { font-size: 1.8em; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        .tempo-espera { font-size: 1.2em; font-weight: 800; padding: 5px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
        
        .ticket-body { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .item-row { display: flex; gap: 15px; font-size: 1.3em; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-row:last-child { border: none; }
        .item-qtde { font-weight: 900; color: var(--warning); min-width: 40px; }
        .item-nome { font-weight: 600; line-height: 1.2; }

        .ticket-footer { padding: 15px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
        .btn-kds { width: 100%; padding: 20px; font-size: 1.2em; font-weight: 900; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .btn-start { background: var(--bg-dark); color: white; border: 2px solid var(--border-color); }
        .btn-start:hover { background: #334155; }
        
        .btn-finish { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-finish:hover { background: #059669; }

        /* ESTADO VAZIO */
        .empty-kds { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); }
        .empty-kds i { font-size: 5em; margin-bottom: 20px; opacity: 0.2; }
        .empty-kds h2 { font-size: 2em; font-weight: 400; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-top:0; color: white;">🍳 Ecrã da Cozinha</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Faça login para ligar o ecrã.</p>
        <input type="email" id="email" class="input-form" placeholder="Email do Lojista">
        <input type="password" id="password" class="input-form" placeholder="Password">
        <button onclick="fazerLogin()" class="btn-login" id="btn-login-text">Entrar na Cozinha</button>
    </div>
</div>

<div id="kds-screen" style="display: none; height: 100%;">
    <header>
        <div class="logo-area">
            <h1><span class="status-dot"></span> <span id="nome-restaurante">A carregar Cozinha...</span></h1>
        </div>
        <div style="display:flex; gap: 15px; align-items: center;">
            <div style="color: var(--text-muted); font-size: 1.2em; font-weight: bold; background: var(--bg-card); padding: 8px 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                Pendentes: <span id="contador-pendentes" style="color: white;">0</span>
            </div>
            <button onclick="logout()" style="background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.5em;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div class="main-content" id="linha-producao">
        </div>
</div>

<script>
    const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
    
    let minhaLojaId = null;
    let timerAtualizacao = null; // Para atualizar os minutos de espera a cada 60 segundos

    // 1. LOGIN E SESSÃO
    async function verificarSessao() {
        const { data: { session } } = await _sb.auth.getSession();
        if (session) iniciarCozinha(session.user.id);
    }

    async function fazerLogin() {
        const btn = document.getElementById('btn-login-text');
        btn.innerText = "A ligar fogões...";
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const { data, error } = await _sb.auth.signInWithPassword({ email: e, password: p });
        if (error) { alert("Erro: " + error.message); btn.innerText = "Entrar na Cozinha"; } 
        else { iniciarCozinha(data.user.id); }
    }

    async function logout() { await _sb.auth.signOut(); window.location.reload(); }

    // 2. ARRANCAR COZINHA E REALTIME
    async function iniciarCozinha(userId) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('kds-screen').style.display = 'block';

        const { data: loja } = await _sb.from('lojas').select('id, nome').eq('user_id', userId).single();
        if (!loja) { alert("Não tem nenhuma loja registada."); return; }
        
        minhaLojaId = loja.id;
        document.getElementById('nome-restaurante').innerText = "Cozinha - " + loja.nome;

        carregarPedidos();

        // Atualiza os minutos nos cartões a cada 1 minuto
        if(timerAtualizacao) clearInterval(timerAtualizacao);
        timerAtualizacao = setInterval(carregarPedidos, 60000);

        _sb.channel('cozinha-updates')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos', filter: `loja_id=eq.${minhaLojaId}` }, payload => {
                // Toca a sineta se for um pedido novo!
                if(payload.eventType === 'INSERT' || (payload.eventType === 'UPDATE' && payload.new.estado === 'pendente')) {
                    tocarSinoCozinha();
                }
                carregarPedidos();
            })
            .subscribe();
    }

    // 3. CARREGAR E DESENHAR TICKETS
    async function carregarPedidos() {
        // Na cozinha, só queremos ver o que está pendente ou a ser feito. (Pronto = Desaparece)
        const { data: pedidos } = await _sb.from('pedidos')
            .select('*')
            .eq('loja_id', minhaLojaId)
            .in('estado', ['pendente', 'preparacao'])
            .order('estado', { ascending: false }) // 'preparacao' aparece primeiro
            .order('created_at', { ascending: true }); // Os mais antigos primeiro

        const div = document.getElementById('linha-producao');
        document.getElementById('contador-pendentes').innerText = pedidos ? pedidos.length : 0;
        
        if (!pedidos || pedidos.length === 0) {
            div.innerHTML = `
                <div class="empty-kds">
                    <i class="fas fa-fire-burner"></i>
                    <h2>A Cozinha está limpa!</h2>
                    <p>A aguardar novos pedidos...</p>
                </div>`;
            return;
        }

        div.innerHTML = pedidos.map(p => {
            // Calcular tempo de espera
            const horaPedido = new Date(p.created_at);
            const agora = new Date();
            const diffMinutos = Math.floor((agora - horaPedido) / 60000);
            
            let corTempo = diffMinutos > 15 ? 'color: var(--danger);' : ''; // Fica vermelho se > 15min

            // Informação do Local (Mesa ou Takeaway)
            let localTag = '';
            if (p.tipo_pedido === 'mesa') {
                localTag = `<i class="fas fa-utensils"></i> Mesa ${p.mesa}`;
            } else if (p.tipo_pedido === 'levantamento') {
                localTag = `<i class="fas fa-shopping-bag"></i> Takeaway`;
            } else {
                localTag = `<i class="far fa-calendar-alt"></i> Reserva`;
            }

            // Lista de pratos (Letras GIGANTES)
            let itensHtml = p.itens.map(item => `
                <div class="item-row">
                    <div class="item-qtde">${item.qtde}x</div>
                    <div class="item-nome">${item.nome}</div>
                </div>
            `).join('');

            // Lógica dos Botões baseada no Estado
            let btnAcao = '';
            let classeEstado = '';

            if (p.estado === 'pendente') {
                classeEstado = 'estado-pendente';
                btnAcao = `<button class="btn-kds btn-start" onclick="mudarEstado(${p.id}, 'preparacao')"><i class="fas fa-fire"></i> Iniciar Preparação</button>`;
            } else if (p.estado === 'preparacao') {
                classeEstado = 'estado-preparacao';
                btnAcao = `<button class="btn-kds btn-finish" onclick="mudarEstado(${p.id}, 'pronto')"><i class="fas fa-bell"></i> Marcar como Pronto</button>`;
            }

            return `
                <div class="ticket ${classeEstado}">
                    <div class="ticket-header">
                        <div class="mesa-numero">${localTag}</div>
                        <div class="tempo-espera" style="${corTempo}">${diffMinutos}m</div>
                    </div>
                    <div class="ticket-body">
                        ${itensHtml}
                    </div>
                    <div class="ticket-footer">
                        ${btnAcao}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function mudarEstado(id, novoEstado) {
        await _sb.from('pedidos').update({ estado: novoEstado }).eq('id', id);
        // O Realtime dispara e atualiza os ecrãs (Cozinha e Sala) automaticamente!
    }

    // EXTRA: Som estridente de cozinha!
    function tocarSinoCozinha() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = "triangle";
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.8);
        } catch(e) {}
    }

    verificarSessao();
</script>
</body>
</html>
