<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montra Portugal Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; padding: 40px; }
    </style>
</head>
<body>
    <div id="slider"></div>

    <script>
        const _sb = supabase.createClient("https://hhrmbrcaujfsqfanxqqq.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhocm1icmNhdWpmc3FmYW54cXFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTA0NDIsImV4cCI6MjA4ODcyNjQ0Mn0.pPkvwcb4h8SjYyvAFt1dnJE6Xn8KDQ4TVcy-QiamLpk");
        let currentIndex = 0;

        async function carregarProdutos() {
            const { data: produtos } = await _sb.from('produtos').select('*, lojas(nome_loja)').limit(20);
            const slider = document.getElementById('slider');
            slider.innerHTML = produtos.map((p, i) => `
                <div class="slide ${i===0?'active':''}">
                    <img src="${p.url_foto}">
                    <div class="overlay">
                        <h1>${p.nome_artigo}</h1>
                        <h2>${p.preco}€</h2>
                        <p>${p.lojas.nome_loja}</p>
                    </div>
                </div>
            `).join('');
            
            setInterval(() => {
                const slides = document.querySelectorAll('.slide');
                slides[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % slides.length;
                slides[currentIndex].classList.add('active');
            }, 6000);
        }
        carregarProdutos();
    </script>
</body>
</html>
